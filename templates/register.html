{% extends 'layout.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <i class="fas fa-user-plus"></i>
    <h3>Student Registration</h3>
    <p>Please enter the student details below to begin face capture.</p>

    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. John Doe" required>
        </div>
        <div class="form-group">
            <label for="roll">Roll Number / ID</label>
            <input type="text" id="roll" name="roll" class="form-control" placeholder="e.g. 101" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Proceed to Capture</button>
    </form>
</div>
{% endblock %}
